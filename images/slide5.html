<!doctype html><html><head><meta charset='utf-8'><style>
html,body{margin:0;padding:0}*{box-sizing:border-box}
.card{position:relative;width:1280px;height:720px;overflow:hidden;
  background:radial-gradient(130% 130% at 0% 0%, #1b2350 0%, #0a1128 55%, #070b1c 100%);
  font-family:-apple-system,'Segoe UI',Roboto,sans-serif;color:#fafaf9}
.glow{position:absolute;width:620px;height:620px;border-radius:50%;
  background:radial-gradient(circle,#8b5cf644 0%,transparent 70%);top:-200px;right:-150px}
.glow2{position:absolute;width:560px;height:560px;border-radius:50%;
  background:radial-gradient(circle,#06b6d433 0%,transparent 70%);bottom:-240px;left:-140px}
.pad{position:relative;padding:72px 84px;height:100%;display:flex;flex-direction:column;justify-content:center}
.kicker{font-size:20px;font-weight:800;letter-spacing:.2em;text-transform:uppercase;color:#fbbf24}
.title{font-family:Georgia,serif;font-weight:800;font-size:84px;line-height:1.04;margin:14px 0 0;letter-spacing:-.01em}
.g{background:linear-gradient(90deg,#a78bfa,#06b6d4);-webkit-background-clip:text;background-clip:text;color:transparent}
.amber{color:#fbbf24}.violet{color:#a78bfa}.cyan{color:#06b6d4}
.sub{font-size:30px;color:#cbd5e1;margin-top:24px;max-width:880px;line-height:1.4}
.h2{font-family:Georgia,serif;font-weight:800;font-size:52px;margin:0 0 30px}
.code{font-family:'JetBrains Mono','Courier New',monospace;font-size:25px;line-height:1.7;
  background:#0b1026;border:1px solid #2a335a;border-radius:16px;padding:30px 34px;color:#e2e8f0}
.code .k{color:#a78bfa}.code .s{color:#86efac}.code .c{color:#64748b}
.cap{font-size:26px;color:#94a3b8;margin-top:30px}
.flow{display:flex;align-items:center;gap:18px;flex-wrap:wrap}
.node{background:#141a33;border:1px solid #2a335a;border-radius:16px;padding:22px 26px;font-size:25px;font-weight:600}
.node.acc{border-color:#8b5cf6;box-shadow:0 0 0 1px #8b5cf655}
.arrow{font-size:34px;color:#8b5cf6;font-weight:800}
.chips{display:flex;gap:16px;margin-top:14px;flex-wrap:wrap}
.chip{font-size:24px;font-weight:600;color:#e2e8f0;background:#141a33;border:1px solid #2a335a;border-radius:999px;padding:12px 22px}
.chip b{color:#a78bfa}
.foot{position:absolute;left:84px;bottom:54px;font-size:22px;color:#94a3b8}
.brand{position:absolute;right:84px;bottom:54px;font-size:22px;font-weight:700}
.brand span{color:#fbbf24}
.panel{background:#0d1430;border:1px solid #2a335a;border-radius:18px;padding:30px 36px;font-size:26px;line-height:1.55;max-width:1000px}
.panel .ci{color:#a78bfa;font-weight:700}
.src{font-family:'JetBrains Mono',monospace;font-size:20px;color:#7dd3fc;margin-top:8px}
.runhead{position:absolute;top:42px;left:84px;display:flex;align-items:center;gap:12px;font-size:24px;font-weight:800;color:#e2e8f0;z-index:6}
.runhead .mag{font-size:26px}
.runhead .b{width:1px;height:24px;background:#2a335a;margin:0 4px}
.runhead .t{color:#fbbf24;font-size:18px;font-weight:800;letter-spacing:.14em;text-transform:uppercase}
</style></head><body><div class='card'><div class='glow'></div><div class='glow2'></div><div class='runhead'><span class='mag'>&#128270;</span> Cited Research Assistant <span class='b'></span><span class='t'>Kaggle Capstone</span></div><div class='pad'>
  <h1 class="title" style="font-size:72px">Change the question.<br><span class="g">It just works.</span></h1>
  <div class="chips" style="margin-top:34px">
    <span class="chip"><b>web_search</b> tool</span>
    <span class="chip">autonomous loop</span>
    <span class="chip">cites <b>[1] [2]</b> sources</span>
  </div>
  <div class="foot">Built with vibe coding &middot; Gemini 2.5 Flash</div>
  <div class="brand">Cited Research Assistant</div>
</div></div></body></html>
